name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck --workspace=apps/web

      - name: Test
        run: npm run test --workspace=apps/web -- --run

      - name: Build
        run: npm run build --workspace=apps/web

  api:
    name: API (format, compile, test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mokaid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      DATABASE_URL: ecto://postgres:postgres@localhost/mokaid_test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - uses: actions/cache@v4
        with:
          path: |
            apps/api/deps
            apps/api/_build
          key: mix-${{ runner.os }}-${{ hashFiles('apps/api/mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: Install dependencies
        working-directory: apps/api
        run: mix deps.get

      - name: Check formatting
        working-directory: apps/api
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        working-directory: apps/api
        run: mix compile --warnings-as-errors

      - name: Test
        working-directory: apps/api
        run: mix test

  ai-worker:
    name: AI Worker (ruff, pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: apps/ai-worker
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: apps/ai-worker
        run: ruff check app tests

      - name: Test
        working-directory: apps/ai-worker
        run: pytest -q

  terraform:
    name: Terraform (fmt, validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive infra/terraform

      - name: Validate modules
        run: |
          for dir in infra/terraform/environments/*/; do
            echo "== $dir"
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done

  docker:
    name: Docker builds
    runs-on: ubuntu-latest
    needs: [web, ai-worker]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build AI worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/ai-worker.Dockerfile
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      # ECR push is wired once AWS OIDC role is configured:
      # - uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: arn:aws:iam::<account>:role/mokaid-ci
      #     aws-region: eu-west-1
      # - uses: aws-actions/amazon-ecr-login@v2
