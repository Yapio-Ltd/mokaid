name: Deploy to AWS

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref_name }}-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    if: >
      vars.AWS_DEPLOY_ENABLED == 'true'
      && (
        github.event_name == 'workflow_dispatch'
        || (
          github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_branch == 'main'
        )
      )

    env:
      AWS_REGION: il-central-1
      DEPLOY_ENV: ${{ inputs.environment || 'dev' }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Check deploy configuration
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "::error::Missing repository secret AWS_DEPLOY_ROLE_ARN. Run terraform apply in infra/terraform/bootstrap and add the github_deploy_role_arn output."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR registry
        id: registry
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: ${{ steps.registry.outputs.registry }}/mokaid-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=api-deploy
          cache-to: type=gha,scope=api-deploy,mode=max

      - name: Build and push AI worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/ai-worker.Dockerfile
          push: true
          tags: ${{ steps.registry.outputs.registry }}/mokaid-ai-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=worker-deploy
          cache-to: type=gha,scope=worker-deploy,mode=max

      - name: Deploy API to ECS
        env:
          CLUSTER: mokaid-${{ env.DEPLOY_ENV }}
          SERVICE: mokaid-${{ env.DEPLOY_ENV }}-api
          TASK_FAMILY: mokaid-${{ env.DEPLOY_ENV }}-api
          IMAGE: ${{ steps.registry.outputs.registry }}/mokaid-api:${{ env.IMAGE_TAG }}
        run: .github/scripts/deploy-ecs-service.sh

      - name: Run database migrations
        env:
          CLUSTER: mokaid-${{ env.DEPLOY_ENV }}
          TASK_FAMILY: mokaid-${{ env.DEPLOY_ENV }}-api
          CONTAINER: mokaid-${{ env.DEPLOY_ENV }}-api
        run: .github/scripts/run-ecs-migration.sh

      - name: Deploy AI worker to ECS
        env:
          CLUSTER: mokaid-${{ env.DEPLOY_ENV }}
          SERVICE: mokaid-${{ env.DEPLOY_ENV }}-ai-worker
          TASK_FAMILY: mokaid-${{ env.DEPLOY_ENV }}-ai-worker
          IMAGE: ${{ steps.registry.outputs.registry }}/mokaid-ai-worker:${{ env.IMAGE_TAG }}
        run: .github/scripts/deploy-ecs-service.sh
